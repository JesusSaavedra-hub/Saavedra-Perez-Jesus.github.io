<!DOCTYPE html>
 <html>
  <head>
   <title>Tabla con colspan y rowspan</title>
  </head>
   <body>
   <style>
    table {
        width: 100%;       /* O, 800px */
        height: 400px;     /* Ajustar alto */
        border: 1px solid black;
    }
</style>

    <table border="5">
 <tr>
 <th colspan="3">Horario de Clases</th>
  </tr>
 <tr>
 <th>Día</th>
 <th>Materia</th>
 <th>Horario</th>
  </tr>
 <tr>
   <td rowspan="2">Lunes</td>
   <td>Programación</td>
   <td>8:00 - 10:00</td>
  </tr>
 <tr>
 <td>Base de Datos</td>
 <td>10:00 - 12:00</td>

  </tr>
 <tr>
 <th colspan="3">CONVIVIO INTEGRADOR</th>
  </tr>
  </tr>
 <tr>
 <td>Miercoles</td>
 <td rowspan="1">Codificacion de HTML</td>
 <td colspan="2">Proyecto Integrador</td>
  </tr>
  <tr>
 <td>Jueves</td>
 <td rowspan="1">rowspan y colspan</td>
 <td colspan="2">8:00 - 9:00</td>
  </tr>
 <td rowspan="2">Viernes</td>
 <td>Interactuando con CSS</td>
 <td>9:00 - 10:00</td>
  </tr>
  <tr>
 <td>Codifica Sofware </td>
 <td>12:00 - 1:00</td>
 </table>
  </body>
   </html>
    </table>
    </body>
 </html>
